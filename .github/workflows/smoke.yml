name: Smoke-Test (Login-Mail)

on:
  workflow_dispatch:
    inputs:
      email:
        description: "E-Mail für den Test-Login"
        required: false
        default: "schrittweise.smoketest@example.com"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Secret-Werte prüfen (ohne Schlüssel auszugeben)
        env:
          RUNTIME_ENV_JSON: ${{ secrets.RUNTIME_ENV_JSON }}
        run: |
          echo "$RUNTIME_ENV_JSON" | jq -r 'keys' || { echo "::error::RUNTIME_ENV_JSON ist kein gültiges JSON"; exit 1; }
          for k in ANTHROPIC_API_KEY JWT_SECRET DATABASE_URL SUPABASE_ANON_KEY; do
            v=$(echo "$RUNTIME_ENV_JSON" | jq -r ".$k // empty")
            if LC_ALL=C grep -qP '[^\x20-\x7e]' <<<"$v"; then
              echo "::warning::$k enthält NICHT-ASCII-Zeichen (beim Einfügen beschädigt), Länge ${#v}"
            else
              echo "$k: ok (Länge ${#v})"
            fi
          done

      - name: Supabase OTP direkt aufrufen (Publishable Key wie im Code)
        run: |
          curl -sS -w "\nHTTP %{http_code}\n" -X POST \
            "https://bogrqbazqjvjpahuecon.supabase.co/auth/v1/otp?redirect_to=https://schrittweise-2-0.vercel.app/login/verify" \
            -H "apikey: sb_publishable_Y1lYSALGd8Wdg_HoDjf0cA_217R27Ne" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${{ inputs.email }}\",\"create_user\":true}"

      - name: request-link der App aufrufen
        run: |
          curl -sS -w "\nHTTP %{http_code}\n" -X POST \
            "https://schrittweise-2-0.vercel.app/api/auth/request-link" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${{ inputs.email }}\",\"register\":true,\"display_name\":\"Smoke\"}"
