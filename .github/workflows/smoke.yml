name: Smoke-Test (Login)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Registrierung (200 beim ersten Mal, 409 danach – beides ok)
        run: |
          code=$(curl -sS -o /tmp/reg.json -w "%{http_code}" -X POST \
            "https://schrittweise-2-0.vercel.app/api/auth/register" \
            -H "Content-Type: application/json" \
            -d '{"email":"schrittweise.smoketest@example.com","password":"smoke-test-passwort-123","display_name":"Smoke"}')
          echo "Register: HTTP $code"; cat /tmp/reg.json; echo ""
          [ "$code" = "200" ] || [ "$code" = "409" ] || exit 1

      - name: Login muss funktionieren
        run: |
          code=$(curl -sS -o /tmp/login.json -w "%{http_code}" -X POST \
            "https://schrittweise-2-0.vercel.app/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"schrittweise.smoketest@example.com","password":"smoke-test-passwort-123"}')
          echo "Login: HTTP $code"
          [ "$code" = "200" ] || { cat /tmp/login.json; exit 1; }
          python3 -c "import json; d=json.load(open('/tmp/login.json')); assert d['access_token']; print('Token erhalten, Nutzer:', d['user']['display_name'])"

      - name: Falsches Passwort muss 401 geben
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            "https://schrittweise-2-0.vercel.app/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"schrittweise.smoketest@example.com","password":"absichtlich-falsch"}')
          echo "Falsches Passwort: HTTP $code"
          [ "$code" = "401" ] || exit 1
