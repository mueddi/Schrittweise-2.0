name: Backup (Datenbank)

# Woechentliches Voll-Backup der Supabase-Datenbank als GitHub-Artefakt.
# In der DB stehen gekaufte Guthaben und Zahlungen – die duerfen nie
# verloren gehen. Wiederherstellung: siehe docs/BACKUP.md
#
# Benoetigte Secrets (Settings -> Secrets and variables -> Actions):
#   DATABASE_URL     Supabase "Session pooler"-Connection-String
#   BACKUP_PASSWORD  (optional) verschluesselt das Artefakt zusaetzlich

on:
  schedule:
    - cron: "0 3 * * 0" # jeden Sonntag 03:00 UTC
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Secret prüfen
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Secret DATABASE_URL fehlt – Supabase Session-Pooler-URL unter Settings → Secrets → Actions anlegen."
            exit 1
          fi

      # pg_dump aus dem offiziellen postgres:17-Container: passt immer zur
      # Supabase-Serverversion, unabhaengig vom Runner-Image.
      - name: Datenbank sichern
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run --rm -e DATABASE_URL postgres:17 \
            sh -c 'pg_dump "$DATABASE_URL" --format=custom --no-owner --no-privileges' \
            > schrittweise.dump
          ls -lh schrittweise.dump
          # Ein leerer Dump waere ein stiller Totalausfall des Backups
          [ "$(stat -c%s schrittweise.dump)" -gt 10000 ] || { echo "::error::Dump verdächtig klein"; exit 1; }

      - name: Verschlüsseln (falls BACKUP_PASSWORD gesetzt)
        env:
          BACKUP_PASSWORD: ${{ secrets.BACKUP_PASSWORD }}
        run: |
          if [ -n "$BACKUP_PASSWORD" ]; then
            openssl enc -aes-256-cbc -pbkdf2 -pass env:BACKUP_PASSWORD \
              -in schrittweise.dump -out schrittweise.dump.enc
            rm schrittweise.dump
            echo "Backup verschlüsselt."
          else
            echo "Kein BACKUP_PASSWORD gesetzt – Artefakt bleibt unverschlüsselt (Repo-Zugriff genügt zum Download)."
          fi

      - name: Als Artefakt ablegen (90 Tage)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: schrittweise.dump*
          retention-days: 90
          if-no-files-found: error
