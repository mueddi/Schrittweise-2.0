name: Deploy (Vercel)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

jobs:
  # Gate: kaputte Commits duerfen nie live gehen.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Backend-Tests
        run: |
          pip install -q -r backend/requirements.txt pytest
          python -m pytest backend/tests/ -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend-Build
        working-directory: frontend
        run: |
          npm ci --silent
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Secrets prüfen
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          RUNTIME_ENV_JSON: ${{ secrets.RUNTIME_ENV_JSON }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$RUNTIME_ENV_JSON" ]; then
            echo "::error::Secrets fehlen: VERCEL_TOKEN und RUNTIME_ENV_JSON unter Settings → Secrets and variables → Actions anlegen."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Secrets kommen als gitignore'd Sidecar ins Deployment-Paket (api/index.py liest sie);
      # sie landen NIE im Git-Verlauf. Das separate Secret ANTHROPIC_API_KEY (einzeiliger
      # Klartext, weniger fehleranfällig beim Einfügen) überschreibt den JSON-Wert.
      # Beim Einfügen beschädigte Werte (Nicht-ASCII) werden verworfen statt deployt.
      - name: Secrets-Sidecar schreiben
        env:
          RUNTIME_ENV_JSON: ${{ secrets.RUNTIME_ENV_JSON }}
          ANTHROPIC_API_KEY_OVERRIDE: ${{ secrets.ANTHROPIC_API_KEY }}
          STRIPE_SECRET_KEY_IN: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET_IN: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          python3 - <<'EOF'
          import json, os

          env = json.loads(os.environ["RUNTIME_ENV_JSON"])
          override = (os.environ.get("ANTHROPIC_API_KEY_OVERRIDE") or "").strip()
          if override:
              env["ANTHROPIC_API_KEY"] = override
          for name, target in (("STRIPE_SECRET_KEY_IN", "STRIPE_SECRET_KEY"),
                               ("STRIPE_WEBHOOK_SECRET_IN", "STRIPE_WEBHOOK_SECRET")):
              value = (os.environ.get(name) or "").strip()
              if value:
                  env[target] = value
          for key, value in list(env.items()):
              if isinstance(value, str) and not value.isascii():
                  print(f"::warning::{key} enthält Nicht-ASCII-Zeichen (Einfüge-Schaden) und wird verworfen")
                  env.pop(key)
          with open("api/runtime-env.json", "w") as f:
              json.dump(env, f)
          print("Sidecar geschrieben mit Schlüsseln:", sorted(env))
          EOF

      - name: Zu Vercel deployen
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN" | tee deploy-url.txt
          {
            echo "### Produktions-URL"
            tail -n 1 deploy-url.txt
          } >> "$GITHUB_STEP_SUMMARY"

  # Nach dem Deploy die Live-App anstupsen: Registrierung/Login muessen gehen.
  smoke:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Registrierung (200 beim ersten Mal, 409 danach – beides ok)
        run: |
          code=$(curl -sS -o /tmp/reg.json -w "%{http_code}" -X POST \
            "https://schrittweise-2-0.vercel.app/api/auth/register" \
            -H "Content-Type: application/json" \
            -d '{"email":"schrittweise.smoketest@example.com","password":"smoke-test-passwort-123","display_name":"Smoke"}')
          echo "Register: HTTP $code"; cat /tmp/reg.json; echo ""
          [ "$code" = "200" ] || [ "$code" = "409" ] || exit 1
      - name: Login muss funktionieren
        run: |
          code=$(curl -sS -o /tmp/login.json -w "%{http_code}" -X POST \
            "https://schrittweise-2-0.vercel.app/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"schrittweise.smoketest@example.com","password":"smoke-test-passwort-123"}')
          echo "Login: HTTP $code"
          [ "$code" = "200" ] || { cat /tmp/login.json; exit 1; }
          python3 -c "import json; d=json.load(open('/tmp/login.json')); assert d['access_token']"
      - name: Falsches Passwort muss 401 geben
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            "https://schrittweise-2-0.vercel.app/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"schrittweise.smoketest@example.com","password":"absichtlich-falsch"}')
          echo "Falsches Passwort: HTTP $code"
          [ "$code" = "401" ] || exit 1
